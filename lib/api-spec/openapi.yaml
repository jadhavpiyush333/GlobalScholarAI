openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Study Abroad AI Counselor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: openai
    description: OpenAI AI chat operations
  - name: knowledge
    description: Knowledge base for universities, programs, and visa requirements
  - name: fields
    description: Field insights including future scope, job opportunities, and competition

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on success or failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /knowledge/universities:
    get:
      operationId: listUniversities
      tags: [knowledge]
      summary: List all universities in the knowledge base
      parameters:
        - name: country
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: field
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of universities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/University"

  /knowledge/universities/{id}:
    get:
      operationId: getUniversity
      tags: [knowledge]
      summary: Get a university with its programs, contacts, and financial info
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: University with full details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversityWithDetails"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /knowledge/programs:
    get:
      operationId: listPrograms
      tags: [knowledge]
      summary: List all programs in the knowledge base
      parameters:
        - name: universityId
          in: query
          required: false
          schema:
            type: integer
        - name: degree
          in: query
          required: false
          schema:
            type: string
        - name: field
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"

  /knowledge/visa-requirements:
    get:
      operationId: listVisaRequirements
      tags: [knowledge]
      summary: List visa requirements by country
      parameters:
        - name: country
          in: query
          required: false
          schema:
            type: string
        - name: visaType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of visa requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VisaRequirement"

  /fields:
    get:
      operationId: listFields
      tags: [fields]
      summary: List all available study fields
      responses:
        "200":
          description: List of fields
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldInsight"

  /fields/{slug}:
    get:
      operationId: getField
      tags: [fields]
      summary: Get detailed field insight including future scope, jobs, competition
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Field insight details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldInsight"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UniversityContact:
      type: object
      properties:
        admissionsEmail:
          type: string
        admissionsPhone:
          type: string
        internationalOfficeEmail:
          type: string
        internationalOfficePhone:
          type: string
        address:
          type: string
        visaCounselorEmail:
          type: string
        visaCounselorPhone:
          type: string
        financialAidEmail:
          type: string
        financialAidPhone:
          type: string

    University:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        city:
          type: string
        website:
          type: string
        description:
          type: string
        ranking:
          type: integer
        fields:
          type: string
        scholarshipsAvailable:
          type: boolean
        financialServices:
          type: string
        imageUrl:
          type: string
      required:
        - id
        - name
        - country
        - city

    Program:
      type: object
      properties:
        id:
          type: integer
        universityId:
          type: integer
        universityName:
          type: string
        name:
          type: string
        degree:
          type: string
        duration:
          type: string
        language:
          type: string
        tuitionPerYear:
          type: string
        applicationDeadline:
          type: string
        requirements:
          type: string
        ieltsMin:
          type: number
        toeflMin:
          type: number
        fieldSlug:
          type: string
      required:
        - id
        - universityId
        - universityName
        - name
        - degree
        - duration
        - language

    UniversityWithDetails:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        city:
          type: string
        website:
          type: string
        description:
          type: string
        ranking:
          type: integer
        fields:
          type: string
        scholarshipsAvailable:
          type: boolean
        imageUrl:
          type: string
        contact:
          $ref: "#/components/schemas/UniversityContact"
        programs:
          type: array
          items:
            $ref: "#/components/schemas/Program"
        financialServices:
          type: string
      required:
        - id
        - name
        - country
        - city
        - programs

    VisaRequirement:
      type: object
      properties:
        id:
          type: integer
        country:
          type: string
        visaType:
          type: string
        requirements:
          type: string
        processingTime:
          type: string
        fees:
          type: string
        proofOfFunds:
          type: string
        notes:
          type: string
        visaCounselorTips:
          type: string
      required:
        - id
        - country
        - visaType
        - requirements

    JobOpportunity:
      type: object
      properties:
        title:
          type: string
        avgSalaryUSD:
          type: string
        demandLevel:
          type: string
        topHiringCountries:
          type: string
      required:
        - title
        - avgSalaryUSD
        - demandLevel
        - topHiringCountries

    FieldInsight:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        futureScope:
          type: string
        globalCompetition:
          type: string
        competitionLevel:
          type: string
        avgStartingSalaryUSD:
          type: string
        topCountriesForJobs:
          type: string
        growthRate:
          type: string
        jobOpportunities:
          type: array
          items:
            $ref: "#/components/schemas/JobOpportunity"
        topSkillsRequired:
          type: string
        industryTrends:
          type: string
      required:
        - id
        - slug
        - name
        - description
